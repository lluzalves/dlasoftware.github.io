      en: {
        label: 'Language', subtitle: 'PRIVACY POLICY · DLA SOFTWARE', updated: 'Last updated: May 31, 2026',
        intro: '<strong>The short version:</strong> you can play <em>Race XRZ 1000</em> without creating an account. Your pilot name and race history stay on your device. The free version uses Google AdMob for ads, and Google Play handles the optional Remove Ads purchase. We use Firebase Analytics and Crashlytics to improve the game — Analytics only after you consent. We do not sell your personal information.',
        sections: [
          ['1. Information Stored by Race XRZ 1000', '<p>Race XRZ 1000 does not require an account. The following information is stored locally on your device so Race XRZ 1000 can work:</p><ul><li>the pilot name you choose, race results, and high scores;</li><li>game settings and preferences, such as tutorial status and whether ads have been removed;</li><li>your age-gate and terms-acceptance status.</li></ul><p>We do not receive your locally stored pilot name or race history. Eligible local game data may be included in Android backup or device-transfer services depending on your device settings. Age-gate, terms-acceptance, and advertising-preference data are excluded from backup and device transfer.</p>'],
          ['2. Advertising and Privacy Choices', '<p>The free version of Race XRZ 1000 uses Google AdMob to display interstitial advertisements. AdMob and its partners may process information such as device identifiers, the Android Advertising ID where available, IP address, ad interactions, diagnostics, and other device or usage data in accordance with Google policies and the choices available to you.</p><p>Race XRZ 1000 uses Google User Messaging Platform (UMP) to request and manage advertising privacy choices where required. The consent message identifies the applicable ad partners and lets you review their purposes. When available, you can review or change those choices from <strong>Options → Privacy Choices</strong>. You can also manage advertising settings on your device.</p><p><strong>We do not sell your personal information.</strong> We do not share your information with third parties for their own independent marketing purposes other than as described in this section.</p><p>Google information: ' + googlePrivacy + ', ' + googleAds + ', and ' + googleBusinessData + '.</p>'],
          ['3. Analytics and Crash Reporting', '<p>Race XRZ 1000 uses two Firebase services provided by Google LLC to improve the game\'s stability and understand how it is played:</p><p><strong>Firebase Analytics</strong> collects anonymised usage events such as game sessions, difficulty tier reached, score milestones, language preference, and in-app interactions. Events do not include your pilot name, email, or any personally identifiable information. Firebase Analytics is <strong>disabled by default</strong> and enabled only after you explicitly accept this Privacy Policy on first launch. If you do not accept, no Analytics data is collected for your session.</p><p><strong>Firebase Crashlytics</strong> automatically collects crash reports when the app encounters an unexpected error. Reports include device model, operating system version, app version, and a technical stack trace. No personally identifiable information is included. Crashlytics runs regardless of advertising consent as it serves only to identify and fix technical problems.</p><p>Firebase data is processed by Google LLC: ' + googlePrivacy + '.</p>'],
          ['4. Google Play Billing', '<p>Race XRZ 1000 uses Google Play Billing for the optional one-time <strong>Remove Ads</strong> purchase. Google Play processes the transaction. We do not receive or store your payment-card or bank-account details. Purchase entitlement information is used only to provide and restore the purchased feature.</p>'],
          ['5. Permissions and Network Access', '<p>Race XRZ 1000 requests internet and network-state access for ads, privacy messaging, and Google Play services. It declares Android Advertising ID access for AdMob. Race XRZ 1000 does not request precise location access.</p>'],
          ['6. Optional Score Sharing', '<p>If you choose to share a score card, Race XRZ 1000 creates an image in temporary app cache and opens Android\'s share sheet. Nothing is shared unless you select a destination. The service or recipient you choose handles the shared image under its own terms and privacy policy.</p>'],
          ['7. Children and Age Requirement', '<p>Race XRZ 1000 is intended for players aged <strong>13 or older</strong>. Race XRZ 1000 includes an age gate and blocks access when a player declares that they are under 13. We do not knowingly offer Race XRZ 1000 to children under 13. If you believe a child has provided information through Race XRZ 1000, please contact us so we can address it.</p>'],
          ['8. Your Choices and Data Retention', '<p>You can clear local race records from the Options menu. You can manage advertising privacy choices through the Privacy Choices entry in Race XRZ 1000 when it is required and available, and through your device settings. Firebase Analytics can be avoided entirely by not accepting this Privacy Policy on first launch. Uninstalling Race XRZ 1000 removes local app data from the device, subject to any eligible Android backup retained under your device or platform settings.</p>'],
          ['9. Security and International Processing', '<p>We use the platform protections available to a mobile application, including encrypted on-device storage for sensitive preferences. No method of storage or transmission is completely secure. Google and its service providers may process information in countries other than your own under their applicable policies.</p>'],
          ['10. Changes to This Policy', '<p>We may update this Privacy Policy when Race XRZ 1000, its services, or legal requirements change. The revised policy will be posted on this page with a new update date. Where required by law, we will notify you or request renewed acceptance.</p>'],

          ['12. Contact', '<p>Questions or privacy requests: ' + email + '</p>']

          ['4. Faturamento do Google Play', '<p>Race XRZ 1000 usa o Google Play Billing para a compra opcional única <strong>Remover Anúncios</strong>. O Google Play processa a transação. Não recebemos nem armazenamos dados do seu cartão ou conta bancária. As informações do direito adquirido são usadas apenas para fornecer e restaurar o recurso comprado.</p>'],
          ['5. Permissões e acesso à rede', '<p>Race XRZ 1000 solicita acesso à internet e ao estado da rede para anúncios, mensagens de privacidade e serviços do Google Play. Ele declara acesso ao ID de publicidade do Android para o AdMob. Race XRZ 1000 não solicita acesso à localização precisa.</p>'],
          ['6. Compartilhamento opcional de pontuação', '<p>Se você optar por compartilhar um cartão de pontuação, Race XRZ 1000 cria uma imagem no cache temporário do aplicativo e abre a tela de compartilhamento do Android. Nada é compartilhado até que você selecione um destino. O serviço ou destinatário escolhido trata a imagem conforme seus próprios termos e política de privacidade.</p>'],
          ['7. Crianças e requisito de idade', '<p>Race XRZ 1000 destina-se a jogadores com <strong>13 anos ou mais</strong>. Race XRZ 1000 inclui uma verificação de idade e bloqueia o acesso quando o jogador declara ter menos de 13 anos. Não oferecemos intencionalmente Race XRZ 1000 a crianças menores de 13 anos. Se você acreditar que uma criança forneceu informações por meio de Race XRZ 1000, entre em contato conosco.</p>'],
          ['8. Suas escolhas e retenção de dados', '<p>Você pode apagar os registros locais de corridas no menu Opções. Você pode gerenciar escolhas de privacidade de publicidade pela opção Escolhas de Privacidade disponível em Race XRZ 1000 quando exigida, além das configurações do dispositivo. O Firebase Analytics pode ser evitado completamente não aceitando esta Política de Privacidade na primeira inicialização. Desinstalar Race XRZ 1000 remove os dados locais do aplicativo do dispositivo, sujeito a eventuais backups elegíveis mantidos conforme suas configurações.</p>'],
          ['9. Segurança e processamento internacional', '<p>Usamos as proteções de plataforma disponíveis para um aplicativo móvel, incluindo armazenamento criptografado no dispositivo para preferências sensíveis. Nenhum método de armazenamento ou transmissão é totalmente seguro. O Google e seus prestadores de serviços podem processar informações em países diferentes do seu, conforme as políticas aplicáveis.</p>'],
          ['10. Alterações desta Política', '<p>Podemos atualizar esta Política de Privacidade quando Race XRZ 1000, seus serviços ou requisitos legais mudarem. A política revisada será publicada nesta página com uma nova data de atualização. Quando exigido por lei, notificaremos você ou solicitaremos nova aceitação.</p>'],
          ['11. Seus direitos de privacidade', '<p>Dependendo do local onde você vive, você pode ter o direito de acessar, corrigir ou excluir informações tratadas sobre você, ou de se opor a determinados tratamentos ou limitá-los. Residentes da Califórnia (CCPA/CPRA) e da União Europeia (RGPD) têm direitos específicos pela lei aplicável, incluindo o direito de saber quais dados são coletados, solicitar exclusão e recusar a venda — o que não se aplica aqui, pois não vendemos informações pessoais.</p><p>Para escolhas relacionadas à publicidade, use <strong>Opções → Escolhas de Privacidade</strong> em Race XRZ 1000 quando disponível, ou as configurações de publicidade do seu dispositivo. Para outras solicitações de privacidade, entre em contato pelo endereço da Seção 12.</p>'],

        sections: [
          ['1. Información almacenada por Race XRZ 1000', '<p>Race XRZ 1000 no requiere una cuenta. La siguiente información se almacena localmente en tu dispositivo para que Race XRZ 1000 funcione:</p><ul><li>el nombre de piloto que elijas, los resultados de las carreras y las mejores puntuaciones;</li><li>ajustes y preferencias de Race XRZ 1000, como el estado del tutorial y si se han eliminado los anuncios;</li><li>el estado de la verificación de edad y de la aceptación de los términos.</li></ul><p>No recibimos tu nombre de piloto ni tu historial de carreras almacenados localmente. Los datos locales aptos de Race XRZ 1000 pueden incluirse en los servicios de copia de seguridad o transferencia de dispositivos de Android según los ajustes de tu dispositivo. Los datos de verificación de edad, aceptación de los términos y preferencias de publicidad quedan excluidos de las copias de seguridad y transferencias.</p>'],

          ['4. Facturación de Google Play', '<p>Race XRZ 1000 utiliza Google Play Billing para la compra opcional única <strong>Eliminar Anuncios</strong>. Google Play procesa la transacción. No recibimos ni almacenamos los datos de tu tarjeta o cuenta bancaria. La información del derecho de compra solo se utiliza para proporcionar y restaurar la función adquirida.</p>'],

          ['6. Uso compartido opcional de puntuaciones', '<p>Si decides compartir una tarjeta de puntuación, Race XRZ 1000 crea una imagen en la caché temporal de la aplicación y abre el panel para compartir de Android. No se comparte nada hasta que selecciones un destino. El servicio o destinatario que elijas tratará la imagen conforme a sus propios términos y política de privacidad.</p>'],
          ['7. Menores y requisito de edad', '<p>Race XRZ 1000 está destinado a jugadores de <strong>13 años o más</strong>. Incluye una verificación de edad y bloquea el acceso cuando un jugador declara tener menos de 13 años. No ofrecemos intencionadamente Race XRZ 1000 a menores de 13 años. Si crees que un menor ha proporcionado información a través de Race XRZ 1000, contáctanos.</p>'],
          ['8. Tus opciones y conservación de datos', '<p>Puedes borrar los registros locales de carreras desde el menú Opciones. Puedes gestionar tus opciones de privacidad publicitaria desde Opciones de Privacidad en Race XRZ 1000 cuando sea necesaria, además de los ajustes del dispositivo. Firebase Analytics puede evitarse completamente no aceptando esta Política de Privacidad en el primer inicio. Al desinstalar Race XRZ 1000 se eliminan los datos locales de la aplicación del dispositivo.</p>'],

          ['10. Cambios en esta Política', '<p>Podemos actualizar esta Política de Privacidad cuando cambien Race XRZ 1000, sus servicios o los requisitos legales. La política revisada se publicará en esta página con una nueva fecha de actualización. Cuando lo exija la ley, te notificaremos o solicitaremos una nueva aceptación.</p>'],

          ['2. Publicité et choix de confidentialité', '<p>La version gratuite de Race XRZ 1000 utilise Google AdMob pour afficher des publicités interstitielles. AdMob et ses partenaires peuvent traiter des informations telles que les identifiants de l\'appareil, l\'identifiant publicitaire Android lorsqu\'il est disponible, l\'adresse IP, les interactions avec les publicités, les diagnostics et d\'autres données relatives à l\'appareil ou à l\'utilisation, conformément aux politiques de Google et aux choix qui vous sont proposés.</p><p>Race XRZ 1000 utilise Google User Messaging Platform (UMP) pour demander et gérer vos choix de confidentialité publicitaire lorsque cela est requis. Lorsqu\'elle est disponible, vous pouvez consulter ou modifier votre sélection via <strong>Options → Choix de Confidentialité</strong>.</p><p><strong>Nous ne vendons pas vos informations personnelles.</strong></p><p>Informations Google : ' + googlePrivacy + ', ' + googleAds + ' et ' + googleBusinessData + '.</p>'],
          ['3. Analyse et rapports d\'incidents', '<p>Race XRZ 1000 utilise deux services Firebase de Google LLC pour améliorer la stabilité du jeu et comprendre comment il est joué :</p><p><strong>Firebase Analytics</strong> collecte des événements d\'utilisation anonymisés tels que des sessions de jeu, le niveau de difficulté atteint, des jalons de score, la préférence de langue et des interactions dans l\'application. Les événements n\'incluent pas votre nom de pilote, votre adresse e-mail ni aucune information personnelle identifiable. Firebase Analytics est <strong>désactivé par défaut</strong> et n\'est activé qu\'après avoir explicitement accepté la présente Politique de confidentialité au premier lancement. Si vous ne l\'acceptez pas, aucune donnée Analytics n\'est collectée pour votre session.</p><p><strong>Firebase Crashlytics</strong> collecte automatiquement des rapports d\'incidents lorsque l\'application rencontre une erreur inattendue. Les rapports incluent le modèle de l\'appareil, la version du système d\'exploitation, la version de l\'application et une trace technique de la pile d\'erreur. Aucune information personnelle identifiable n\'est incluse. Crashlytics fonctionne indépendamment du consentement publicitaire, car il sert uniquement à identifier et corriger des problèmes techniques.</p><p>Les données Firebase sont traitées par Google LLC : ' + googlePrivacy + '.</p>'],
          ['4. Facturation Google Play', '<p>Race XRZ 1000 utilise Google Play Billing pour l\'achat facultatif et unique <strong>Supprimer les Publicités</strong>. Google Play traite la transaction. Nous ne recevons ni ne stockons les coordonnées de votre carte ou de votre compte bancaire. Les informations relatives au droit acquis servent uniquement à fournir et restaurer la fonctionnalité achetée.</p>'],
          ['5. Autorisations et accès réseau', '<p>Race XRZ 1000 demande un accès à internet et à l\'état du réseau pour les publicités, les messages de confidentialité et les services Google Play. Il déclare l\'accès à l\'identifiant publicitaire Android pour AdMob. Race XRZ 1000 ne demande pas l\'accès à votre localisation précise.</p>'],
          ['6. Partage facultatif des scores', '<p>Si vous choisissez de partager une carte de score, Race XRZ 1000 crée une image dans le cache temporaire de l\'application et ouvre la feuille de partage Android. Rien n\'est partagé tant que vous n\'avez pas sélectionné une destination. Le service ou destinataire sélectionné traite l\'image selon ses propres conditions et sa propre politique de confidentialité.</p>'],
          ['7. Enfants et âge requis', '<p>Race XRZ 1000 est destiné aux joueurs âgés de <strong>13 ans ou plus</strong>. Il comprend une vérification de l\'âge et bloque l\'accès lorsqu\'un joueur déclare avoir moins de 13 ans. Nous ne proposons pas sciemment Race XRZ 1000 aux enfants de moins de 13 ans. Si vous pensez qu\'un enfant a fourni des informations par l\'intermédiaire de Race XRZ 1000, contactez-nous.</p>'],
          ['8. Vos choix et conservation des données', '<p>Vous pouvez effacer les résultats locaux depuis le menu Options. Vous pouvez gérer vos choix de confidentialité publicitaire via Choix de Confidentialité dans Race XRZ 1000 lorsqu\'elle est requise, ainsi que dans les réglages de votre appareil. Firebase Analytics peut être évité entièrement en ne acceptant pas la présente Politique de confidentialité au premier lancement. La désinstallation de Race XRZ 1000 supprime les données locales de l\'application de l\'appareil.</p>'],
          ['9. Sécurité et traitement international', '<p>Nous utilisons les protections de plateforme disponibles pour une application mobile, notamment le stockage chiffré sur l\'appareil pour les préférences sensibles. Aucune méthode de stockage ou de transmission n\'est totalement sécurisée. Google et ses prestataires peuvent traiter des informations dans des pays autres que le vôtre conformément à leurs politiques applicables.</p>'],
          ['10. Modifications de la présente Politique', '<p>Nous pouvons mettre à jour cette Politique de confidentialité lorsque Race XRZ 1000, ses services ou les exigences légales évoluent. La version révisée sera publiée sur cette page avec une nouvelle date de mise à jour. Lorsque la loi l\'exige, nous vous en informerons ou demanderons une nouvelle acceptation.</p>'],
          ['11. Vos droits en matière de confidentialité', '<p>Selon votre lieu de résidence, vous pouvez disposer du droit d\'accéder à vos informations, de les corriger ou de les supprimer, ou de vous opposer à certains traitements ou de les limiter. Les résidents de Californie (CCPA/CPRA) et de l\'Union européenne (RGPD) bénéficient de droits spécifiques en vertu de la loi applicable. Les présentes Conditions n\'excluent aucun droit légal qui ne peut légalement être exclu.</p><p>Pour les choix liés à la publicité, utilisez <strong>Options → Choix de Confidentialité</strong> dans Race XRZ 1000 lorsque disponible, ou les paramètres publicitaires de votre appareil. Pour toute autre demande de confidentialité, contactez-nous à l\'adresse indiquée à la Section 12.</p>'],
          ['12. Contact', '<p>Questions ou demandes relatives à la confidentialité : ' + email + '</p>']
        ]

      de: {
        label: 'Sprache', subtitle: 'DATENSCHUTZRICHTLINIE · DLA SOFTWARE', updated: 'Letzte Aktualisierung: 31. Mai 2026',
        intro: '<strong>Kurz gesagt:</strong> Du kannst <em>Race XRZ 1000</em> ohne Konto spielen. Dein Pilotenname und dein Rennverlauf bleiben auf deinem Gerät. Die kostenlose Version verwendet Google AdMob für Werbung, und Google Play verarbeitet den optionalen Kauf Werbung Entfernen. Wir verwenden Firebase Analytics und Crashlytics zur Verbesserung des Spiels — Analytics nur nach deiner Einwilligung. Wir verkaufen deine personenbezogenen Daten nicht.',
        sections: [
          ['1. Von Race XRZ 1000 gespeicherte Informationen', '<p>Für Race XRZ 1000 ist kein Konto erforderlich. Damit Race XRZ 1000 funktioniert, werden folgende Informationen lokal auf deinem Gerät gespeichert:</p><ul><li>der von dir gewählte Pilotenname, Rennergebnisse und Highscores;</li><li>Spieleinstellungen und Präferenzen, etwa der Tutorial-Status und ob Werbung entfernt wurde;</li><li>der Status der Altersprüfung und der Annahme der Bedingungen.</li></ul><p>Wir erhalten weder deinen lokal gespeicherten Pilotennamen noch deinen Rennverlauf. Zulässige lokale Spieldaten können abhängig von deinen Geräteeinstellungen in Android-Sicherungen oder Geräteübertragungen einbezogen werden. Daten zur Altersprüfung, Annahme der Bedingungen und Werbepräferenzen sind von Sicherungen und Übertragungen ausgeschlossen.</p>'],
          ['2. Werbung und Datenschutzoptionen', '<p>Die kostenlose Version von Race XRZ 1000 verwendet Google AdMob zur Anzeige von Interstitial-Werbung. AdMob und seine Partner können Informationen wie Gerätekennungen, die Android-Werbe-ID (soweit verfügbar), IP-Adresse, Anzeigeninteraktionen, Diagnosedaten und weitere Geräte- oder Nutzungsdaten gemäß den Google-Richtlinien und den dir angebotenen Auswahlmöglichkeiten verarbeiten.</p><p>Race XRZ 1000 nutzt die Google User Messaging Platform (UMP), um erforderliche Datenschutzoptionen für Werbung abzufragen und zu verwalten. Soweit verfügbar, kannst du deine Auswahl unter <strong>Optionen → Datenschutzauswahl</strong> prüfen oder ändern.</p><p><strong>Wir verkaufen deine personenbezogenen Daten nicht.</strong></p><p>Google-Informationen: ' + googlePrivacy + ', ' + googleAds + ' und ' + googleBusinessData + '.</p>'],
          ['3. Analyse und Absturzberichte', '<p>Race XRZ 1000 nutzt zwei Firebase-Dienste von Google LLC, um die Stabilität des Spiels zu verbessern und zu verstehen, wie es gespielt wird:</p><p><strong>Firebase Analytics</strong> erfasst anonymisierte Nutzungsereignisse wie Spielsitzungen, erreichte Schwierigkeitsstufen, Punktzahlmeilensteine, Sprachpräferenzen und In-App-Interaktionen. Die Ereignisse enthalten weder deinen Pilotennamen noch deine E-Mail-Adresse oder andere personenbezogene Daten. Firebase Analytics ist <strong>standardmäßig deaktiviert</strong> und wird erst aktiviert, nachdem du beim ersten Start ausdrücklich diese Datenschutzrichtlinie akzeptiert hast. Wenn du sie nicht akzeptierst, werden keine Analytics-Daten für deine Sitzung erfasst.</p><p><strong>Firebase Crashlytics</strong> erfasst automatisch Absturzberichte, wenn die App auf einen unerwarteten Fehler trifft. Berichte enthalten Gerätemodell, Betriebssystemversion, App-Version und einen technischen Stacktrace des Fehlers. Es sind keine personenbezogenen Daten enthalten. Crashlytics läuft unabhängig von der Werbeeinwilligung, da es ausschließlich der Identifizierung und Behebung technischer Probleme dient.</p><p>Firebase-Daten werden von Google LLC verarbeitet: ' + googlePrivacy + '.</p>'],
          ['4. Google Play Billing', '<p>Race XRZ 1000 verwendet Google Play Billing für den optionalen einmaligen Kauf <strong>Werbung Entfernen</strong>. Google Play verarbeitet die Transaktion. Wir erhalten oder speichern keine Karten- oder Bankverbindungsdaten. Informationen zur Kaufberechtigung werden ausschließlich verwendet, um die erworbene Funktion bereitzustellen und wiederherzustellen.</p>'],
          ['5. Berechtigungen und Netzwerkzugriff', '<p>Race XRZ 1000 fordert Internet- und Netzwerkstatuszugriff für Werbung, Datenschutzhinweise und Google-Play-Dienste an. Für AdMob wird der Zugriff auf die Android-Werbe-ID deklariert. Race XRZ 1000 fordert keinen Zugriff auf deinen genauen Standort an.</p>'],
          ['6. Optionales Teilen von Ergebnissen', '<p>Wenn du eine Ergebniskarte teilen möchtest, erstellt Race XRZ 1000 ein Bild im temporären App-Cache und öffnet die Android-Freigabeansicht. Es wird nichts geteilt, solange du kein Ziel auswählst. Der ausgewählte Dienst oder Empfänger verarbeitet das geteilte Bild gemäß seinen eigenen Bedingungen und Datenschutzrichtlinien.</p>'],
          ['7. Kinder und Altersanforderung', '<p>Race XRZ 1000 ist für Spieler ab <strong>13 Jahren</strong> bestimmt. Es enthält eine Altersabfrage und sperrt den Zugriff, wenn ein Spieler angibt, jünger als 13 Jahre zu sein. Wir bieten Race XRZ 1000 nicht wissentlich Kindern unter 13 Jahren an. Bitte kontaktiere uns, wenn du glaubst, dass ein Kind Informationen über Race XRZ 1000 bereitgestellt hat.</p>'],
          ['8. Deine Auswahlmöglichkeiten und Speicherdauer', '<p>Lokale Rennergebnisse können im Optionsmenü gelöscht werden. Datenschutzoptionen für Werbung lassen sich über den Eintrag Datenschutzauswahl in Race XRZ 1000 verwalten, wenn dieser erforderlich und verfügbar ist, sowie über die Geräteeinstellungen. Firebase Analytics kann vollständig vermieden werden, indem diese Datenschutzrichtlinie beim ersten Start nicht akzeptiert wird. Bei der Deinstallation werden lokale App-Daten vom Gerät entfernt.</p>'],
          ['9. Sicherheit und internationale Verarbeitung', '<p>Wir verwenden die für eine mobile Anwendung verfügbaren Plattformschutzmaßnahmen, einschließlich verschlüsselter Gerätespeicherung für sensible Einstellungen. Keine Speicher- oder Übertragungsmethode ist vollständig sicher. Google und seine Dienstleister können Informationen gemäß ihren jeweiligen Richtlinien in anderen Ländern als deinem eigenen verarbeiten.</p>'],
          ['10. Änderungen dieser Richtlinie', '<p>Wir können diese Datenschutzrichtlinie aktualisieren, wenn sich Race XRZ 1000, seine Dienste oder rechtliche Anforderungen ändern. Die überarbeitete Richtlinie wird mit einem neuen Aktualisierungsdatum auf dieser Seite veröffentlicht. Soweit gesetzlich vorgeschrieben, informieren wir dich oder bitten erneut um Zustimmung.</p>'],
          ['11. Deine Datenschutzrechte', '<p>Abhängig von deinem Wohnort hast du möglicherweise das Recht, auf über dich verarbeitete Informationen zuzugreifen, diese zu berichtigen oder löschen zu lassen, oder bestimmten Verarbeitungen zu widersprechen oder diese einzuschränken. Einwohner Kaliforniens (CCPA/CPRA) und der Europäischen Union (DSGVO) haben spezifische Rechte nach geltendem Recht. Diese Richtlinie schließt keine gesetzlichen Rechte aus, die nicht ausgeschlossen werden dürfen.</p><p>Für werbebezogene Auswahlmöglichkeiten nutze <strong>Optionen → Datenschutzauswahl</strong> in Race XRZ 1000, sofern verfügbar, oder die Werbeeinstellungen deines Geräts. Für alle anderen Datenschutzanfragen kontaktiere uns unter der Adresse in Abschnitt 12.</p>'],
          ['12. Kontakt', '<p>Fragen oder Datenschutzanfragen: ' + email + '</p>']
        ]
      },
      ar: {

        sections: [
          ['1. المعلومات التي تخزنها Race XRZ 1000', '<p>لا تتطلب Race XRZ 1000 إنشاء حساب. تُخزَّن المعلومات التالية محليًا على جهازك لكي تعمل Race XRZ 1000:</p><ul><li>اسم السائق الذي تختاره ونتائج السباقات وأعلى النتائج؛</li><li>إعدادات Race XRZ 1000 وتفضيلاتها، مثل حالة البرنامج التعليمي وما إذا كانت الإعلانات قد أزيلت؛</li><li>حالة بوابة العمر والموافقة على الشروط.</li></ul><p>لا نتلقى اسم السائق أو سجل السباقات المخزنين محليًا. قد تُضمَّن بيانات Race XRZ 1000 المحلية المؤهلة في خدمات النسخ الاحتياطي أو نقل الجهاز في Android وفقًا لإعدادات جهازك. تُستبعد بيانات بوابة العمر والموافقة على الشروط وتفضيلات الإعلانات من النسخ الاحتياطي ونقل الجهاز.</p>'],
          ['2. الإعلانات وخيارات الخصوصية', '<p>تستخدم النسخة المجانية من Race XRZ 1000 Google AdMob لعرض إعلانات بينية. قد يعالج AdMob وشركاؤه معلومات مثل معرّفات الجهاز ومعرّف إعلانات Android عند توفره وعنوان IP والتفاعل مع الإعلانات وبيانات التشخيص وغيرها من بيانات الجهاز أو الاستخدام، وفقًا لسياسات Google والخيارات المتاحة لك.</p><p>تستخدم Race XRZ 1000 Google User Messaging Platform (UMP) لطلب خيارات خصوصية الإعلانات وإدارتها عند الحاجة. عندما يكون ذلك متاحًا، يمكنك مراجعة خياراتك أو تغييرها من <strong>الخيارات ← خيارات الخصوصية</strong>.</p><p><strong>نحن لا نبيع معلوماتك الشخصية.</strong></p><p>معلومات Google: ' + googlePrivacy + ' و' + googleAds + ' و' + googleBusinessData + '.</p>'],
          ['3. التحليلات وتقارير الأعطال', '<p>تستخدم Race XRZ 1000 خدمتين من Firebase مقدمتين من Google LLC لتحسين استقرار اللعبة وفهم أسلوب اللعب:</p><p>يجمع <strong>Firebase Analytics</strong> أحداث استخدام مجهولة الهوية مثل جلسات اللعب ومستوى الصعوبة الذي تم بلوغه ومعالم النقاط وتفضيل اللغة والتفاعلات داخل التطبيق. لا تتضمن الأحداث اسم السائق أو البريد الإلكتروني أو أي معلومات تعريف شخصية. يكون Firebase Analytics <strong>معطلًا بشكل افتراضي</strong> ولا يُفعَّل إلا بعد قبولك صراحةً لهذه السياسة عند أول تشغيل. إذا لم تقبل، فلن يتم جمع أي بيانات تحليلية خاصة بجلستك.</p><p>يجمع <strong>Firebase Crashlytics</strong> تلقائيًا تقارير الأعطال عند مواجهة التطبيق لخطأ غير متوقع. تتضمن التقارير طراز الجهاز وإصدار نظام التشغيل وإصدار التطبيق وتتبع مكدس تقني للخطأ. لا تتضمن أي معلومات تعريف شخصية. يعمل Crashlytics بصرف النظر عن الموافقة على الإعلانات لأنه يخدم فقط الغرض من تحديد المشكلات التقنية وإصلاحها.</p><p>تُعالج بيانات Firebase من قِبل Google LLC: ' + googlePrivacy + '.</p>'],
          ['4. فوترة Google Play', '<p>تستخدم Race XRZ 1000 Google Play Billing لعملية الشراء الاختيارية لمرة واحدة <strong>إزالة الإعلانات</strong>. يعالج Google Play المعاملة. لا نتلقى أو نخزن بيانات بطاقتك أو حسابك المصرفي. تُستخدم معلومات استحقاق الشراء فقط لتقديم الميزة المشتراة واستعادتها.</p>'],
          ['5. الأذونات والوصول إلى الشبكة', '<p>تطلب Race XRZ 1000 الوصول إلى الإنترنت وحالة الشبكة من أجل الإعلانات ورسائل الخصوصية وخدمات Google Play. وتصرّح بالوصول إلى معرّف إعلانات Android لصالح AdMob. لا تطلب Race XRZ 1000 الوصول إلى موقعك الدقيق.</p>'],
          ['6. مشاركة النتائج الاختيارية', '<p>إذا اخترت مشاركة بطاقة نتيجة، تنشئ Race XRZ 1000 صورة في ذاكرة التخزين المؤقت المؤقتة للتطبيق وتفتح لوحة المشاركة في Android. لا تتم مشاركة أي شيء حتى تختار وجهة. يتعامل التطبيق أو المستلم الذي تختاره مع الصورة وفقًا لشروطه وسياسة الخصوصية الخاصة به.</p>'],
          ['7. الأطفال ومتطلب العمر', '<p>Race XRZ 1000 مخصصة للاعبين بعمر <strong>13 سنة أو أكثر</strong>. تتضمن Race XRZ 1000 بوابة عمر وتحظر الوصول عندما يصرّح اللاعب بأن عمره أقل من 13 سنة. لا نقدم Race XRZ 1000 عن قصد للأطفال دون 13 سنة. إذا كنت تعتقد أن طفلًا قدم معلومات من خلال Race XRZ 1000، تواصل معنا.</p>'],
          ['8. خياراتك والاحتفاظ بالبيانات', '<p>يمكنك مسح سجلات السباقات المحلية من قائمة الخيارات. ويمكنك إدارة خيارات خصوصية الإعلانات من خيار الخصوصية داخل Race XRZ 1000 عند الحاجة وتوفره، وكذلك من إعدادات جهازك. يمكن تجنب Firebase Analytics كليًا بعدم قبول هذه السياسة عند أول تشغيل. تؤدي إزالة تثبيت Race XRZ 1000 إلى حذف بيانات التطبيق المحلية من الجهاز.</p>'],
          ['9. الأمان والمعالجة الدولية', '<p>نستخدم وسائل حماية المنصة المتاحة لتطبيقات الهاتف المحمول، بما في ذلك التخزين المشفر على الجهاز للتفضيلات الحساسة. لا توجد طريقة تخزين أو نقل آمنة بالكامل. قد تعالج Google ومقدمو خدماتها المعلومات في دول غير دولتك وفقًا لسياساتهم المعمول بها.</p>'],

    function chooseLanguage() {
      const supported = ['en', 'pt-BR', 'es', 'fr', 'de', 'ar'];
      const urlParam = new URLSearchParams(window.location.search).get('lang');
      if (urlParam && supported.includes(urlParam)) return urlParam;
      const nav = (navigator.language || navigator.userLanguage || 'en').replace('_', '-');
      if (supported.includes(nav)) return nav;
      const prefix = nav.split('-')[0];
      const match = supported.find(l => l.split('-')[0] === prefix);
      return match || 'en';
    }

    function render(lang) {
      const p = policies[lang] || policies.en;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('subtitle').textContent = p.subtitle;
      document.getElementById('language-label').textContent = p.label + ':';
      document.getElementById('language').value = lang;
      document.getElementById('content').innerHTML =
        '<p><strong>' + p.updated + '</strong></p><p class="note">' + p.intro + '</p><hr/>' +
        p.sections.map(s => '<section><h2>' + s[0] + '</h2>' + s[1] + '</section>').join('');
      document.getElementById('footer').textContent = '© 2026 DLA Software · Race XRZ 1000';
    }

    document.getElementById('language').addEventListener('change', function(e) {
      const lang = e.target.value;
      const url = new URL(window.location);
      url.searchParams.set('lang', lang);
      window.history.replaceState({}, '', url);
      render(lang);
    });

    render(chooseLanguage());
  </script>
