    // Detect browser language and match against supported locales.
    // Priority: 1) ?lang= URL param  2) navigator.language  3) fallback 'en'
    function chooseLanguage() {
      const supported = ['en', 'pt-BR', 'es', 'fr', 'de', 'ar'];
      const urlParam = new URLSearchParams(window.location.search).get('lang');
      if (urlParam && supported.includes(urlParam)) return urlParam;
      const nav = (navigator.language || navigator.userLanguage || 'en').replace('_', '-');
      if (supported.includes(nav)) return nav;
      const prefix = nav.split('-')[0];
      const match = supported.find(l => l.split('-')[0] === prefix);
      return match || 'en';
    }

    function render(lang) {
      const t = terms[lang] || terms.en;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('language-label').textContent = t.label + ':';
      document.getElementById('language').value = lang;
      document.getElementById('content').innerHTML =
        '<p><strong>' + t.updated + '</strong></p><p class="note">' + t.intro + '</p><hr/>' +
        t.sections.map(s => '<section><h2>' + s[0] + '</h2>' + s[1] + '</section>').join('');
      document.getElementById('footer').textContent = '© 2026 DLA Software · Race XRZ 1000';
    }

    document.getElementById('language').addEventListener('change', function(e) {
      const lang = e.target.value;
      const url = new URL(window.location);
      url.searchParams.set('lang', lang);
      window.history.replaceState({}, '', url);
      render(lang);
    });

    render(chooseLanguage());
  </script>
